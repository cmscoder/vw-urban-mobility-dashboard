name: 🤖 AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 🔎 Gemini Code Review
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          model: 'gemini-2.5-flash'
          context-lines: '20'
          prompt: |
            You are a Frontend Architect at Volkswagen Digital:HUB.
            Review this Pull Request focusing on:
            1. Clean Architecture & SOLID principles.
            2. React 19 and TypeScript best practices.
            3. Potential bugs or performance issues.
            4. Suggest improvements in a professional, constructive, and concise tone.
            If the code looks perfect, give a brief 'LGTM' (Looks Good To Me) and highlight what you liked.
